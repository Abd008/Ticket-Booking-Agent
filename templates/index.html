<!DOCTYPE html>
<html>

<head>
    <title>QT Agent</title>
</head>

<body>

    <h1>QT — Booking Assistant</h1>

    <form action="/start" method="post">

        <label>From:</label>
        <input type="text" name="from_station" required><br><br>

        <label>To:</label>
        <input type="text" name="to_station" required><br><br>

        <label>Date:</label>
        <input type="text" name="date" required><br><br>

        <label>Train Number:</label>
        <input type="text" name="train_number" required><br><br>

        <label>Class:</label>
        <input type="text" name="travel_class" required><br><br>

        <label>Quota:</label>
        <select name="quota" required>
            <option value="">-- Select Quota --</option>
            <option value="GENERAL">General</option>
            <option value="LADIES">Ladies</option>
            <option value="LOWER BERTH/SR.CITIZEN">Lower Berth/Sr.Citizen</option>
            <option value="PERSON WITH DISABILITY">Person with Disability</option>
            <option value="DUTY PASS">Duty Pass</option>
            <option value="TATKAL">Tatkal</option>
            <option value="PREMIUM TATKAL">Premium Tatkal</option>
        </select><br><br>

        <!-- ✅ PAYMENT MODE -->
        <label>Payment Mode:</label>
        <select name="payment_mode">
            <option value="upi">UPI</option>
            <option value="netbanking">Net Banking</option>
        </select><br><br>

        <!-- ✅ MOBILE -->
        <label>Mobile:</label>
        <input type="text" name="mobile" required><br><br>

        <!-- ✅ PASSENGER -->
        <h3>Passenger</h3>

        <label>Name:</label>
        <input type="text" name="name" required><br><br>

        <label>Age:</label>
        <input type="text" name="age" required><br><br>

        <label>Gender:</label>
        <select name="gender">
            <option value="M">Male</option>
            <option value="F">Female</option>
        </select><br><br>

        <label>Berth:</label>
        <select name="berth">
            <option value="LB">Lower</option>
            <option value="MB">Middle</option>
            <option value="UB">Upper</option>
            <option value="SL">Side Lower</option>
            <option value="SU">Side Upper</option>
        </select><br><br>

        <button type="submit">Start Booking</button>

    </form>

    <hr>

    <h2>Live Logs</h2>

    <pre id="logs" style="
    background:black;
    color:lime;
    padding:10px;
    height:300px;
    overflow:auto;
"></pre>

    <script>
        function fetchLogs() {
            fetch('/logs')
                .then(res => res.text())
                .then(data => {
                    const logBox = document.getElementById('logs');
                    logBox.textContent = data;
                    logBox.scrollTop = logBox.scrollHeight;
                });
        }

        setInterval(fetchLogs, 1000);
    </script>

</body>

</html>
